model: "yolo11n.pt"  # Will upgrade to yolo26n.pt when available
epochs: 50
batch_size: 16
imgsz: 1280
device: [0, 1]
patience: 10

# Augmentation for small objects
close_mosaic: 10
copy_paste: 0.5
mixup: 0.1
scale: 0.9
fliplr: 0.5

# Standard augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
mosaic: 1.0
